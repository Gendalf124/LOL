name: Run R Script

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать вручную кнопкой

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies (если нужны)
        run: |
          Rscript -e 'install.packages(c("readr", "dplyr"))' # Укажите свои пакеты

      - name: Run script
        run: Rscript lol.R # Замените на имя вашего главного файла
